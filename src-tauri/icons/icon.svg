<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74BCFF"/>
      <stop offset="60%" stop-color="#2E7EF0"/>
      <stop offset="100%" stop-color="#1248C8"/>
    </linearGradient>
    <filter id="flake-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="14" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <!-- Single arm template: shaft + two diagonal branches -->
    <g id="arm">
      <line x1="0" y1="-18" x2="0" y2="-292"
            stroke="white" stroke-width="28" stroke-linecap="round"/>
      <line x1="0" y1="-164" x2="-76" y2="-206"
            stroke="white" stroke-width="22" stroke-linecap="round"/>
      <line x1="0" y1="-164" x2="76"  y2="-206"
            stroke="white" stroke-width="22" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Background: macOS-style squircle -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Subtle upper-left sheen for depth -->
  <ellipse cx="390" cy="330" rx="230" ry="170" fill="white" opacity="0.07"/>

  <!-- Snowflake -->
  <g transform="translate(512,512)" filter="url(#flake-shadow)">
    <use href="#arm"/>
    <use href="#arm" transform="rotate(60)"/>
    <use href="#arm" transform="rotate(120)"/>
    <use href="#arm" transform="rotate(180)"/>
    <use href="#arm" transform="rotate(240)"/>
    <use href="#arm" transform="rotate(300)"/>
    <!-- Center dot -->
    <circle r="28" fill="white"/>
  </g>
</svg>
